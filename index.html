<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日新闻 - 2026-04-15</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .header p { font-size: 1.2em; opacity: 0.9; }
        .tag-section {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .tag-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f0f0;
        }
        .tag-icon { font-size: 1.8em; }
        .tag-title { font-size: 1.4em; color: #333; font-weight: 600; }
        .news-item { padding: 12px 0; border-bottom: 1px solid #f5f5f5; }
        .news-item:last-child { border-bottom: none; }
        .news-item a {
            color: #333;
            text-decoration: none;
            display: block;
            transition: all 0.2s;
        }
        .news-item a:hover { color: #667eea; transform: translateX(5px); }
        .news-title { font-size: 1.1em; line-height: 1.5; margin-bottom: 6px; }
        .news-meta { font-size: 0.85em; color: #999; }
        .news-meta span { margin-right: 15px; }
        .empty-tag { color: #999; font-style: italic; }
        .footer { text-align: center; color: white; margin-top: 30px; opacity: 0.8; }
        @media (max-width: 600px) {
            body { padding: 10px; }
            .header h1 { font-size: 1.8em; }
            .tag-section { padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📰 每日新闻</h1>
            <p>2026-04-15</p>
        </div>

        <div class="tag-section">
            <div class="tag-header">
                <span class="tag-icon">🤖</span>
                <span class="tag-title">AI</span>
            </div>

            <div class="news-item">
                <a href="https://seqpu.com/CPUsArentDead/" target="_blank" rel="noopener">
                    <div class="news-title">CPUs Aren't Dead. Gemma2B Out Scored GPT-3.5 Turbo on Test That Made It Famous</div>
                    <div class="news-meta">来源: Hacker News | 2026-04-15 17:07</div>
                </a>
            </div>
        </div>

        <div class="tag-section">
            <div class="tag-header">
                <span class="tag-icon">💰</span>
                <span class="tag-title">金融</span>
            </div>

            <div class="news-item">
                <a href="https://quote.eastmoney.com/sh603444.html" target="_blank" rel="noopener">
                    <div class="news-title">吉比特 (603444) 🔴 +10% 现价:393.34</div>
                    <div class="news-meta">来源: 东方财富 | 2026-04-15 | ⭐ 10</div>
                </a>
            </div>
        </div>

        <div class="footer">
            <p>由 GitHub Actions 自动生成 | 更新时间: 18:19:48</p>
        </div>
    </div>
</body>
</html>
